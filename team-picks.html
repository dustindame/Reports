<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Team Picks</title>
  <link rel="stylesheet" href="shared/theme.css" />
  <link rel="stylesheet" href="shared/league-gate.css" />
  <link rel="stylesheet" href="team-picks.css" />
</head>
<body>
  <div class="phone-frame">
    <div class="phone-screen turf-bg">

      <header class="picks-header">
        <button class="back-btn" id="backBtn" hidden>
          <span id="backIcon"></span>
        </button>
        <div class="header-row">
          <span class="pylon-icon" id="pylonLeft"></span>
          <span class="header-football" id="headerFootball"></span>
          <h1 class="picks-title">TEAM <span class="gold-text">PICKS</span></h1>
          <span class="pylon-icon" id="pylonRight"></span>
        </div>
        <div class="first-down-line">
          <span class="first-down-text">YOUR ROSTER</span>
        </div>
      </header>

      <main class="picks-main">

        <section class="team-picker" id="teamPicker">
          <div class="section-label">Select a Team</div>
          <div class="team-grid" id="teamGrid"></div>
        </section>

        <section class="roster-view" id="rosterView" hidden>
          <div class="team-banner" id="teamBanner"></div>

          <div class="budget-row" id="budgetRow"></div>

          <div class="roster-list" id="rosterList"></div>
        </section>

      </main>

    </div>

    <button class="board-message-fab" id="messageFab" aria-label="Send a message to the Draft Board">📣</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared/supabase-config.js"></script>
  <script src="shared/data.js"></script>
  <script src="shared/league-gate.js"></script>
  <script src="shared/icons.js"></script>
  <script src="team-picks.js"></script>
</body>
</html>
