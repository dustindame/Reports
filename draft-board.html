<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auction Draft Board</title>
  <link rel="stylesheet" href="shared/theme.css" />
  <link rel="stylesheet" href="shared/league-gate.css" />
  <link rel="stylesheet" href="draft-board.css" />
</head>
<body class="turf-bg">
  <div class="board-scroll-wrapper" id="boardScroll">
    <div class="board-content" id="boardContent">

      <div class="nice-flash" id="niceFlash" hidden><span class="nice-flash-text">NICE! NICE! NICE!</span></div>

      <header class="board-header" id="boardHeader">
        <div class="header-block title-block">
          <h1 class="board-title">
            <span class="title-icon" id="fieldIcon"></span>
            <span id="boardNameText">AUCTION DRAFT BOARD</span>
            <span class="title-icon" id="titleFootballIcon"></span>
          </h1>
          <div class="tracker-block" id="trackerBlock">
            <div class="tracker-numbers">
              <span class="tracker-value" id="draftedValue">0 / 156</span>
              <span class="tracker-label">drafted · <span id="remainingValue">156</span> left</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          </div>
          <div class="shot-banner" id="shotBanner" hidden>SHOT! SHOT! SHOT!</div>
        </div>

        <div class="header-block position-totals-block" id="positionTotalsBlock" hidden>
          <div class="recent-label">Drafted by Position</div>
          <div class="position-totals-row" id="positionTotalsRow"></div>
        </div>

        <div class="header-block elapsed-block" id="elapsedBlock" hidden>
          <div class="tracker-label">Elapsed</div>
          <div class="elapsed-value" id="elapsedValue">0m</div>
        </div>

        <div class="header-block recent-block" id="recentBlock">
          <div class="recent-label">Recent Picks</div>
          <div class="recent-strip" id="recentStrip"></div>
        </div>

        <div class="header-block clock-block">
          <div class="scoreboard-clock">
            <span class="scoreboard-post" id="goalPostLeft"></span>
            <span class="scoreboard-value" id="clockValue">--:--</span>
            <span class="scoreboard-post" id="goalPostRight"></span>
          </div>
        </div>

        <div class="header-block qr-block">
          <a class="qr-code" id="qrCode" href="team-picks.html" title="Open Team Picks lookup"></a>
        </div>
      </header>

      <main class="board-grid" id="boardGrid"></main>

      <footer class="board-ticker" id="boardTicker">
        <div class="ticker-row message-row" id="messageRow" hidden>
          <div class="ticker-track" id="messageTrack"></div>
        </div>
        <div class="ticker-row news-row" id="newsRow">
          <div class="ticker-track" id="tickerTrack"></div>
        </div>
      </footer>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  <script src="shared/supabase-config.js"></script>
  <script src="shared/data.js"></script>
  <script src="shared/league-gate.js"></script>
  <script src="shared/icons.js"></script>
  <script src="draft-board.js"></script>
</body>
</html>
