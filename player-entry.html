<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Enter Pick</title>
  <link rel="stylesheet" href="shared/theme.css" />
  <link rel="stylesheet" href="player-entry.css" />
</head>
<body>
  <div class="phone-frame">
    <div class="phone-screen turf-bg">

      <header class="entry-header">
        <a class="setup-link" href="setup.html" aria-label="Draft setup"><span id="setupGear"></span></a>
        <div class="header-row">
          <span class="pylon-icon" id="pylonLeft"></span>
          <span class="football-icon" id="footballIcon"></span>
          <h1 class="entry-title">ENTER PICK</h1>
          <span class="football-icon" id="footballIcon2"></span>
          <span class="pylon-icon" id="pylonRight"></span>
        </div>
        <div class="first-down-line">
          <span class="first-down-text">LIVE AUCTION</span>
        </div>
      </header>

      <main class="entry-main">

        <section class="search-section">
          <div class="search-box">
            <span class="search-icon" id="searchIcon"></span>
            <input type="text" id="playerSearch" placeholder="Search player name..." autocomplete="off" />
          </div>
          <div class="laces-accent"></div>
          <div class="search-results" id="searchResults"></div>
        </section>

        <section class="preview-section" id="previewSection" hidden>
          <div class="preview-card">
            <span class="flag-icon" id="flagIcon"></span>
            <div class="preview-info">
              <div class="preview-name" id="previewName">—</div>
              <div class="preview-position" id="previewPosition">—</div>
            </div>
            <button class="clear-btn" id="clearBtn">CLEAR</button>
          </div>
        </section>

        <section class="team-section">
          <div class="section-label">Winning Team</div>
          <div class="team-grid" id="teamGrid"></div>
        </section>

        <section class="bid-section">
          <div class="section-label">Amount Selected for Pick</div>
          <div class="bid-amount-track" id="bidAmountTrack">
            <div class="amount-bubble" id="amountBubble">$1</div>
            <div class="field-frame">
              <input type="range" id="bidSlider" min="1" max="200" value="1" step="1" />
            </div>
          </div>
          <div class="budget-stat-row">
            <div class="bsr-item">
              <span class="bsr-label">Min</span>
              <span class="bsr-value">$1</span>
            </div>
            <div class="bsr-item center">
              <span class="bsr-label" id="bsrCenterLabel">Select a team</span>
              <span class="bsr-value bsr-highlight" id="bsrCenterValue">—</span>
            </div>
            <div class="bsr-item right">
              <span class="bsr-label">Max</span>
              <span class="bsr-value" id="bsrMaxValue">$200</span>
            </div>
          </div>
        </section>

        <section class="confirm-section">
          <div class="slide-confirm" id="slideConfirm">
            <div class="slide-progress" id="slideProgress"></div>
            <div class="slide-confirm-label">
              <div class="scl-main" id="sclMain">SLIDE TO CONFIRM</div>
              <div class="scl-sub">Record Completed Pick</div>
            </div>
            <div class="slide-handle" id="slideHandle" tabindex="0" role="button" aria-label="Slide to confirm pick">
              <span id="slideChevron"></span>
            </div>
          </div>
        </section>

        <div class="toast" id="toast">Pick logged!</div>

      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared/supabase-config.js"></script>
  <script src="shared/data.js"></script>
  <script src="shared/icons.js"></script>
  <script src="player-entry.js"></script>
</body>
</html>
